<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #333;
            font-size: 14px;
            padding: 30px;
        }

        .container {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .body {
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <div class="body">
            {{ body|linebreaks }}
        </div>
    </div>
</body>
</html>
